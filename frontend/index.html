<!doctype html>
<html lang="en" data-theme="parchment">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campaign Player Wiki</title>
    <style id="app-loading-inline-styles">
      :root {
        --app-loading-dismiss-duration: 150ms;
        --app-loading-bg: #efe2c5;
        --app-loading-ink: #2f241a;
        --app-loading-accent: #8c4f31;
        --app-loading-media: none;
        --app-loading-media-opacity: 0.16;
      }

      @media (prefers-reduced-motion: reduce) {
        :root {
          --app-loading-dismiss-duration: 0ms;
        }
      }

      html[data-theme="parchment"] {
        --app-loading-bg: #efe2c5;
        --app-loading-ink: #2f241a;
        --app-loading-accent: #8c4f31;
      }

      html[data-theme="moonlit"] {
        --app-loading-bg: #172331;
        --app-loading-ink: #eaf1ff;
        --app-loading-accent: #d4b16f;
        --app-loading-media-opacity: 0.18;
      }

      html[data-theme="verdant"] {
        --app-loading-bg: #dfe9db;
        --app-loading-ink: #233126;
        --app-loading-accent: #4a7e60;
        --app-loading-media-opacity: 0.16;
      }

      html[data-theme="ember"] {
        --app-loading-bg: #f0d3bc;
        --app-loading-ink: #351d18;
        --app-loading-accent: #a34c31;
        --app-loading-media-opacity: 0.14;
      }

      html.app-loading {
        background: var(--app-loading-bg);
        overflow: hidden;
      }

      .app-loading-cover {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        pointer-events: none;
        background: var(--app-loading-bg);
        color: var(--app-loading-ink);
        opacity: 0;
        visibility: hidden;
      }

      .app-loading-cover__message {
        position: relative;
        z-index: 1;
        margin: 0;
        padding: 0.65rem 1rem;
        border: 1px solid color-mix(in srgb, var(--app-loading-accent) 75%, transparent);
        border-radius: 999px;
        background: color-mix(in srgb, var(--app-loading-bg) 75%, transparent);
        box-shadow: 0 18px 42px rgb(0 0 0 / 18%);
        font: 700 0.95rem/1.2 Georgia, "Times New Roman", serif;
        letter-spacing: 0;
      }

      .app-loading-cover__media {
        position: absolute;
        inset: 0;
        background-image: var(--app-loading-visible-media, var(--app-loading-media));
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
        opacity: 0;
      }

      html.app-loading .app-loading-cover,
      html.app-loading .app-loading-cover__message {
        opacity: 1;
        visibility: visible;
      }

      html.app-loading .app-loading-cover__media {
        visibility: visible;
      }

      .app-loading-cover__message,
      .app-loading-cover__media {
        transition: opacity var(--app-loading-dismiss-duration) ease;
      }

      html.app-loading-closing .app-loading-cover {
        transition: opacity var(--app-loading-dismiss-duration) ease;
      }

      html.app-loading-closing .app-loading-cover,
      html.app-loading-closing .app-loading-cover__message,
      html.app-loading-closing .app-loading-cover__media {
        opacity: 0;
      }

      html.app-loading .app-loading-cover--media-ready .app-loading-cover__media,
      html.app-loading.app-loading-media-ready .app-loading-cover__media {
        opacity: var(--app-loading-media-opacity);
      }

      html.app-loading #root {
        opacity: 0;
        visibility: hidden;
      }

      html.app-loading-closing #root {
        opacity: 1;
        visibility: visible;
        transition: opacity var(--app-loading-dismiss-duration) ease;
      }
    </style>
    <script id="app-loading-inline-script">
      (function () {
        var root = document.documentElement;
        var loadingClass = "app-loading";
        var closingClass = "app-loading-closing";
        var mediaReadyClass = "app-loading-media-ready";
        var navigationStartStorageKey = "cpw:app-loading-nav-start";
        var mediaRotationStorageKey = "cpw:app-loading-media-index";
        var activeMediaStorageKey = "cpw:app-loading-active-media-url";
        var activeMediaStyleElementId = "app-loading-active-media-style";
        var failOpenDelayMs = 12000;
        var failOpenTimer = null;
        var hideStarted = false;
        var appReady = false;
        var stylesReady = false;

        applyActiveLoadingMediaFromStorage();
        root.classList.add(loadingClass);
        root.classList.remove(closingClass);

        function parseDurationMs(value) {
          var rawValue = String(value || "").trim();
          if (!rawValue) {
            return 0;
          }
          if (rawValue.endsWith("ms")) {
            return Number.parseFloat(rawValue) || 0;
          }
          if (rawValue.endsWith("s")) {
            return (Number.parseFloat(rawValue) || 0) * 1000;
          }
          return Number.parseFloat(rawValue) || 0;
        }

        function getDismissDurationMs() {
          return parseDurationMs(
            getComputedStyle(root).getPropertyValue("--app-loading-dismiss-duration") || "0ms",
          );
        }

        function collectLoadingMediaUrls(rawValue) {
          if (!rawValue) {
            return [];
          }
          try {
            var parsedValue = JSON.parse(rawValue);
            if (!Array.isArray(parsedValue)) {
              return [];
            }
            return parsedValue.filter(function (url) {
              return typeof url === "string" && url.trim();
            });
          } catch (error) {
            return [];
          }
        }

        function currentMediaIndex(mediaUrlCount) {
          if (!mediaUrlCount) {
            return 0;
          }
          var storedValue = Number.parseInt(sessionStorage.getItem(mediaRotationStorageKey) || "0", 10);
          if (!Number.isFinite(storedValue) || storedValue < 0) {
            return 0;
          }
          return storedValue % mediaUrlCount;
        }

        function advanceMediaRotation(mediaUrlCount) {
          if (mediaUrlCount <= 1) {
            return;
          }
          sessionStorage.setItem(
            mediaRotationStorageKey,
            String((currentMediaIndex(mediaUrlCount) + 1) % mediaUrlCount),
          );
        }

        function loadingCoverIsVisible() {
          return root.classList.contains(loadingClass);
        }

        function loadingMediaStyleValue(url) {
          return "url(" + JSON.stringify(url) + ")";
        }

        function sameOriginLoadingMediaUrl(rawUrl) {
          if (!rawUrl) {
            return "";
          }
          try {
            var parsedUrl = new URL(rawUrl, window.location.href);
            if (parsedUrl.origin !== window.location.origin) {
              return "";
            }
          } catch (error) {
            return "";
          }
          return rawUrl;
        }

        function readActiveLoadingMediaUrl() {
          try {
            return sameOriginLoadingMediaUrl(sessionStorage.getItem(activeMediaStorageKey));
          } catch (error) {
            return "";
          }
        }

        function writeActiveLoadingMediaUrl(url) {
          var mediaUrl = sameOriginLoadingMediaUrl(url);
          if (!mediaUrl) {
            return "";
          }
          try {
            sessionStorage.setItem(activeMediaStorageKey, mediaUrl);
          } catch (error) {
            return "";
          }
          return mediaUrl;
        }

        function removeActiveLoadingMediaStyle() {
          var existingStyle = document.getElementById(activeMediaStyleElementId);
          if (existingStyle) {
            existingStyle.remove();
          }
        }

        function setActiveLoadingMediaStyle(url) {
          var mediaUrl = sameOriginLoadingMediaUrl(url);
          if (!mediaUrl) {
            return "";
          }
          var existingStyle = document.getElementById(activeMediaStyleElementId);
          var styleElement = existingStyle || document.createElement("style");
          styleElement.id = activeMediaStyleElementId;
          styleElement.textContent = [
            "html.app-loading .app-loading-cover { --app-loading-visible-media: "
              + loadingMediaStyleValue(mediaUrl)
              + " !important; }",
            "html.app-loading." + mediaReadyClass
              + " .app-loading-cover__media { opacity: var(--app-loading-media-opacity); }",
          ].join("\n");
          if (!existingStyle) {
            document.head.appendChild(styleElement);
          }
          root.style.setProperty("--app-loading-visible-media", loadingMediaStyleValue(mediaUrl));
          root.classList.add(mediaReadyClass);
          return mediaUrl;
        }

        function clearActiveLoadingMedia() {
          try {
            sessionStorage.removeItem(activeMediaStorageKey);
          } catch (error) {
            // The visual override can still be removed even if storage is unavailable.
          }
          root.classList.remove(mediaReadyClass);
          root.style.removeProperty("--app-loading-visible-media");
          root.style.removeProperty("--app-loading-media");
          removeActiveLoadingMediaStyle();
        }

        function applyActiveLoadingMediaFromStorage() {
          var activeUrl = readActiveLoadingMediaUrl();
          if (activeUrl) {
            setActiveLoadingMediaStyle(activeUrl);
          }
          return activeUrl;
        }

        function applyLoadingMediaToCover(cover, url, options) {
          var mediaUrl = sameOriginLoadingMediaUrl(url);
          if (!mediaUrl) {
            return "";
          }
          var persistActive = !(options && options.persistActive === false);
          if (persistActive) {
            writeActiveLoadingMediaUrl(mediaUrl);
            setActiveLoadingMediaStyle(mediaUrl);
          }
          if (cover) {
            cover.style.setProperty("--app-loading-visible-media", loadingMediaStyleValue(mediaUrl));
            cover.setAttribute("data-app-loading-media-url", mediaUrl);
            cover.classList.add("app-loading-cover--media-ready");
          }
          return mediaUrl;
        }

        function setPreparedLoadingMedia(cover, url) {
          var mediaUrl = sameOriginLoadingMediaUrl(url);
          if (!cover || !mediaUrl) {
            return "";
          }
          cover.setAttribute("data-app-loading-prepared-media-url", mediaUrl);
          cover.setAttribute("data-app-loading-media-url", mediaUrl);
          cover.classList.add("app-loading-cover--media-ready");
          return mediaUrl;
        }

        function loadingMediaUpdateIsSafe() {
          return !root.classList.contains(loadingClass)
            && !root.classList.contains(closingClass)
            && !readActiveLoadingMediaUrl();
        }

        function selectedLoadingMediaUrl(cover) {
          var mediaUrls = collectLoadingMediaUrls(cover.getAttribute("data-app-loading-media-urls"));
          if (mediaUrls.length) {
            return mediaUrls[currentMediaIndex(mediaUrls.length)];
          }
          var fallbackUrl = cover ? String(cover.getAttribute("data-app-loading-media-url") || "").trim() : "";
          return fallbackUrl || "";
        }

        function seedLoadingMediaFromCoverData() {
          var cover = document.querySelector(".app-loading-cover[data-app-loading-media-urls]");
          var activeUrl = applyActiveLoadingMediaFromStorage();
          if (activeUrl) {
            if (cover) {
              applyLoadingMediaToCover(cover, activeUrl);
            }
            return;
          }
          if (!cover) {
            return;
          }
          var preparedUrl = String(
            cover.getAttribute("data-app-loading-prepared-media-url")
              || cover.getAttribute("data-app-loading-media-url")
              || "",
          ).trim();
          if (preparedUrl) {
            applyLoadingMediaToCover(cover, preparedUrl);
            return;
          }
          var selectedUrl = selectedLoadingMediaUrl(cover);
          if (!selectedUrl) {
            return;
          }
          applyLoadingMediaToCover(cover, selectedUrl);
        }

        function prepareLoadingMedia() {
          var cover = document.querySelector(".app-loading-cover[data-app-loading-media-urls]");
          if (!cover) {
            return;
          }
          var mediaUrls = collectLoadingMediaUrls(cover.getAttribute("data-app-loading-media-urls"));
          if (!mediaUrls.length) {
            return;
          }
          if (loadingCoverIsVisible() && cover.classList.contains("app-loading-cover--media-ready")) {
            return;
          }
          var selectedUrl = mediaUrls[currentMediaIndex(mediaUrls.length)];
          var image = new Image();
          image.decoding = "async";
          image.loading = "eager";
          image.onload = function () {
            if (!loadingMediaUpdateIsSafe()) {
              return;
            }
            setPreparedLoadingMedia(cover, selectedUrl);
          };
          image.onerror = function () {
            if (!loadingMediaUpdateIsSafe()) {
              return;
            }
            cover.classList.remove("app-loading-cover--media-ready");
          };
          image.src = selectedUrl;
        }

        function advanceAndPrepareNextLoadingMedia() {
          var cover = document.querySelector(".app-loading-cover[data-app-loading-media-urls]");
          if (!cover) {
            return;
          }
          advanceMediaRotation(
            collectLoadingMediaUrls(cover.getAttribute("data-app-loading-media-urls")).length,
          );
          prepareLoadingMedia();
        }

        function scheduleFailOpen() {
          if (failOpenTimer !== null) {
            window.clearTimeout(failOpenTimer);
          }
          failOpenTimer = window.setTimeout(removeLoadingState, failOpenDelayMs);
        }

        function removeLoadingState() {
          if (hideStarted || !root.classList.contains(loadingClass)) {
            return;
          }
          hideStarted = true;
          if (failOpenTimer !== null) {
            window.clearTimeout(failOpenTimer);
            failOpenTimer = null;
          }
          root.classList.add(closingClass);
          window.requestAnimationFrame(function () {
            root.classList.remove(loadingClass);
            clearActiveLoadingMedia();
            window.setTimeout(function () {
              root.classList.remove(closingClass);
              hideStarted = false;
              advanceAndPrepareNextLoadingMedia();
            }, getDismissDurationMs() + 40);
          });
        }

        function maybeRemoveLoadingState() {
          if (!appReady || !stylesReady) {
            return;
          }
          window.setTimeout(removeLoadingState, 80);
        }

        function isAppStylesheet(linkElement) {
          var href = linkElement.href || linkElement.getAttribute("href") || "";
          return (
            href.indexOf("/app-next/assets/") >= 0 ||
            href.indexOf("/src/") >= 0 ||
            href.indexOf("/static/styles.css") >= 0
          );
        }

        function stylesheetIsReady(linkElement) {
          try {
            return Boolean(linkElement.sheet);
          } catch (error) {
            return true;
          }
        }

        function waitForStylesheet(linkElement) {
          if (stylesheetIsReady(linkElement)) {
            return Promise.resolve();
          }
          return new Promise(function (resolve) {
            var settled = false;
            var timeoutId = window.setTimeout(done, 8000);
            function done() {
              if (settled) {
                return;
              }
              settled = true;
              window.clearTimeout(timeoutId);
              linkElement.removeEventListener("load", done);
              linkElement.removeEventListener("error", done);
              resolve();
            }
            linkElement.addEventListener("load", done, { once: true });
            linkElement.addEventListener("error", done, { once: true });
          });
        }

        function waitForAppStylesheets() {
          var stylesheetLinks = Array.prototype.slice
            .call(document.querySelectorAll('link[rel~="stylesheet"]'))
            .filter(isAppStylesheet);
          if (!stylesheetLinks.length) {
            return Promise.resolve();
          }
          return Promise.all(stylesheetLinks.map(waitForStylesheet));
        }

        function hideWhenReady() {
          prepareLoadingMedia();
          waitForAppStylesheets().then(function () {
            stylesReady = true;
            maybeRemoveLoadingState();
          });
        }

        function shouldIgnoreModifiedClick(event) {
          return event.defaultPrevented || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey || event.button !== 0;
        }

        function isSamePageHashNavigation(url) {
          return (
            url.origin === window.location.origin &&
            url.pathname === window.location.pathname &&
            url.search === window.location.search &&
            Boolean(url.hash)
          );
        }

        function shouldHandleAnchorNavigation(anchor, event) {
          if (!anchor || shouldIgnoreModifiedClick(event)) {
            return false;
          }
          if (anchor.target && anchor.target !== "_self") {
            return false;
          }
          if (anchor.hasAttribute("download") || anchor.closest("[data-app-loading-skip]")) {
            return false;
          }
          var rawHref = anchor.getAttribute("href") || "";
          if (!rawHref || rawHref.startsWith("mailto:") || rawHref.startsWith("tel:") || rawHref.startsWith("javascript:")) {
            return false;
          }
          var targetUrl;
          try {
            targetUrl = new URL(rawHref, window.location.href);
          } catch (error) {
            return false;
          }
          if (targetUrl.origin !== window.location.origin || isSamePageHashNavigation(targetUrl)) {
            return false;
          }
          return true;
        }

        function shouldHandleFormNavigation(form, event) {
          if (!form || event.defaultPrevented || form.closest("[data-app-loading-skip]")) {
            return false;
          }
          if (form.target && form.target !== "_self") {
            return false;
          }
          try {
            return new URL(form.action || window.location.href, window.location.href).origin === window.location.origin;
          } catch (error) {
            return false;
          }
        }

        function beginLoadingState(options) {
          hideStarted = false;
          appReady = false;
          stylesReady = Boolean(options && options.stylesAlreadyReady);
          sessionStorage.setItem(navigationStartStorageKey, String(Date.now()));
          seedLoadingMediaFromCoverData();
          root.classList.add(loadingClass);
          root.classList.remove(closingClass);
          scheduleFailOpen();
          maybeRemoveLoadingState();
        }

        window.__cpwAppLoadingBegin = function () {
          beginLoadingState({ stylesAlreadyReady: true });
        };

        window.__cpwAppLoadingReady = function () {
          appReady = true;
          maybeRemoveLoadingState();
        };

        prepareLoadingMedia();
        scheduleFailOpen();

        document.addEventListener("click", function (event) {
          var anchor = event.target && event.target.closest ? event.target.closest("a[href]") : null;
          if (shouldHandleAnchorNavigation(anchor, event)) {
            beginLoadingState({ stylesAlreadyReady: true });
          }
        });

        document.addEventListener("submit", function (event) {
          if (shouldHandleFormNavigation(event.target, event)) {
            beginLoadingState({ stylesAlreadyReady: true });
          }
        });

        window.addEventListener("pageshow", function (event) {
          if (event.persisted) {
            clearActiveLoadingMedia();
            removeLoadingState();
          }
        });

        if (document.readyState === "complete") {
          hideWhenReady();
        } else {
          window.addEventListener("load", hideWhenReady, { once: true });
        }
      })();
    </script>
  </head>
  <body>
    <div class="app-loading-cover" role="status" aria-live="polite" aria-label="Loading application">
      <div class="app-loading-cover__media" aria-hidden="true"></div>
      <p class="app-loading-cover__message">Loading campaign player wiki...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
