# fly.toml app configuration file for a sample Campaign Player Wiki deployment
# Keep the tracked app name as a placeholder. For real deploys, pass the real Fly
# app with `flyctl deploy -a <real-app>` or use `local.ps1 -Action deploy-fly`
# with `PLAYER_WIKI_FLY_APP` set locally.
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'campaign-player-wiki-example'
primary_region = 'iad'

[build]

[env]
  PLAYER_WIKI_CAMPAIGNS_DIR = '/data/campaigns'
  PLAYER_WIKI_DB_PATH = '/data/player_wiki.sqlite3'
  PLAYER_WIKI_ENV = 'production'
  PLAYER_WIKI_HOST = '0.0.0.0'
  PLAYER_WIKI_PORT = '8080'
  PLAYER_WIKI_PROXY_FIX_HOPS = '1'
  PLAYER_WIKI_RELOAD_CONTENT = 'false'
  PLAYER_WIKI_REQUEST_SLOW_LOG_THRESHOLD_MS = '750'
  PLAYER_WIKI_REQUEST_TRAIL_ENABLED = 'true'
  PLAYER_WIKI_RUNTIME = 'fly'
  PLAYER_WIKI_TRUST_PROXY = 'true'

[[mounts]]
  source = 'player_wiki_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
