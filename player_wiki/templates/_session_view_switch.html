<a
  class="{% if session_subpage == 'session' %}button-link{% else %}ghost-button{% endif %}"
  data-session-switch="1"
  data-session-switch-target="session"
  data-session-switch-full-href="{{ url_for('campaign_session_view', campaign_slug=campaign.slug) }}"
  href="{{ url_for('campaign_session_view', campaign_slug=campaign.slug) }}"
>
  Session
</a>
{% if show_session_character_tab %}
  <a
    data-session-switch="1"
    data-session-switch-target="character"
    class="{% if session_subpage == 'character' %}button-link{% else %}ghost-button{% endif %}"
    data-session-switch-full-href="{{ session_character_switch_href or url_for('campaign_session_character_view', campaign_slug=campaign.slug) }}"
    data-session-switch-fragment-href="{{ session_character_fragment_href or '' }}"
    href="{{ session_character_switch_href or url_for('campaign_session_character_view', campaign_slug=campaign.slug) }}"
  >
    Character
  </a>
{% endif %}
{% if can_manage_session %}
  <a
    data-session-switch="1"
    data-session-switch-target="dm"
    data-session-switch-full-href="{{ url_for('campaign_session_dm_view', campaign_slug=campaign.slug, dm_view='tools') }}"
    class="{% if session_subpage == 'dm' %}button-link{% else %}ghost-button{% endif %}"
    href="{{ url_for('campaign_session_dm_view', campaign_slug=campaign.slug, dm_view='tools') }}"
  >
    DM page
  </a>
{% endif %}
