<nav class="session-dm-task-nav" aria-label="Session DM tasks">
  {% for task in (
    ("tools", "Tools"),
    ("staged", "Staged"),
    ("revealed", "Revealed"),
    ("article-store", "Article store"),
    ("logs", "Logs")
  ) %}
    <a
      class="{{ 'button-link' if session_dm_view == task[0] else 'ghost-button' }}"
      data-session-dm-switch="1"
      data-session-dm-switch-target="{{ task[0] }}"
      href="{{ url_for('campaign_session_dm_view', campaign_slug=campaign.slug, dm_view=task[0]) }}"
      {% if session_dm_view == task[0] %}aria-current="page"{% endif %}
    >{{ task[1] }}</a>
  {% endfor %}
</nav>
