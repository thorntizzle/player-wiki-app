<div
  class="page-layout session-layout"
  data-session-live-root
  data-session-live-view="session"
  data-loading="0"
  data-session-live-url="{{ url_for('campaign_session_live_state', campaign_slug=campaign.slug, view='session') }}"
  data-active-session-id="{{ active_session_id or '' }}"
  data-session-manager-state-token="{{ session_manager_state_token }}"
  data-live-revision="{{ session_live_revision }}"
  data-live-view-token="{{ session_player_live_view_token | default(session_live_view_token, true) }}"
  data-live-active-interval-ms="{{ session_player_poll_active_interval_ms | default(session_poll_active_interval_ms, true) }}"
  data-live-idle-interval-ms="{{ session_player_poll_idle_interval_ms | default(session_poll_idle_interval_ms, true) }}"
  data-live-idle-threshold-ms="{{ session_player_poll_idle_threshold_ms | default(session_poll_idle_threshold_ms, true) }}"
  data-live-diagnostics-enabled="{{ '1' if live_diagnostics_enabled else '0' }}"
>
  <section class="session-column">
    <article class="card session-status-card" data-session-status-card>
      {% include "_session_status_card.html" %}
    </article>

    <article class="card session-chat-card" id="session-chat" data-session-chat-card>
      {% include "_session_chat_card.html" %}
    </article>

    <div data-session-composer-root>
      {% include "_session_composer_card.html" %}
    </div>
  </section>

  <aside class="session-sidebar">
    {% include "_session_wiki_lookup_card.html" %}
  </aside>
</div>
