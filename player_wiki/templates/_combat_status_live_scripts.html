<script>
  (() => {
    const liveRoot = document.querySelector("[data-combat-status-live-root]");
    if (!liveRoot) {
      return;
    }

    const flashRoot = document.querySelector("[data-flash-stack-root]");
    const boardRoot = document.querySelector("[data-combat-status-board-root]");
    const detailRoot = document.querySelector("[data-combat-status-detail-root]");
    const liveUrl = liveRoot.dataset.combatLiveUrl || "";
    const baseViewUrl = liveRoot.dataset.combatStatusBaseUrl || "";
    let combatStateToken = liveRoot.dataset.combatStateToken || "";
    let selectedCombatantId = liveRoot.dataset.selectedCombatantId || "";
    let pollInFlight = false;
    let requestInFlight = false;

    const buildUrl = (baseUrl, combatantId) => {
      const url = new URL(baseUrl, window.location.origin);
      if (combatantId) {
        url.searchParams.set("combatant", combatantId);
      } else {
        url.searchParams.delete("combatant");
      }
      return url.toString();
    };

    const setDetailBusyState = (isBusy) => {
      if (!(detailRoot instanceof HTMLElement)) {
        return;
      }
      detailRoot.setAttribute("aria-busy", isBusy ? "true" : "false");
      detailRoot.dataset.loading = isBusy ? "1" : "0";
    };

    const renderPayload = (payload, { force = false, forceFlash = false, updateHistory = false } = {}) => {
      const nextToken = payload.combat_state_token ? String(payload.combat_state_token) : "";
      if (!force && nextToken === combatStateToken) {
        return;
      }

      if (boardRoot && typeof payload.board_html === "string") {
        boardRoot.innerHTML = payload.board_html;
      }
      if (detailRoot && typeof payload.detail_html === "string") {
        detailRoot.innerHTML = payload.detail_html;
      }
      if (forceFlash && flashRoot && typeof payload.flash_html === "string") {
        flashRoot.innerHTML = payload.flash_html;
      }

      selectedCombatantId = payload.selected_combatant_id ? String(payload.selected_combatant_id) : "";
      combatStateToken = nextToken;
      liveRoot.dataset.selectedCombatantId = selectedCombatantId;
      liveRoot.dataset.combatStateToken = combatStateToken;

      if (updateHistory && baseViewUrl) {
        window.history.replaceState({}, "", buildUrl(baseViewUrl, selectedCombatantId));
      }
    };

    const refreshLiveState = async () => {
      if (pollInFlight || requestInFlight || document.hidden) {
        return;
      }

      pollInFlight = true;
      try {
        const response = await fetch(buildUrl(liveUrl, selectedCombatantId), {
          headers: { "X-Requested-With": "XMLHttpRequest" },
          cache: "no-store",
          credentials: "same-origin",
        });
        if (!response.ok) {
          return;
        }

        const payload = await response.json();
        renderPayload(payload);
      } catch (_) {
        return;
      } finally {
        pollInFlight = false;
      }
    };

    document.addEventListener("click", async (event) => {
      const link = event.target.closest("[data-combat-status-select]");
      if (!(link instanceof HTMLAnchorElement) || !liveRoot.contains(link)) {
        return;
      }

      event.preventDefault();
      if (requestInFlight) {
        return;
      }

      const nextCombatantId = String(link.dataset.combatantId || "");
      if (!nextCombatantId || nextCombatantId === selectedCombatantId) {
        if (baseViewUrl) {
          window.history.replaceState({}, "", buildUrl(baseViewUrl, nextCombatantId));
        }
        return;
      }

      requestInFlight = true;
      setDetailBusyState(true);
      try {
        const response = await fetch(buildUrl(liveUrl, nextCombatantId), {
          headers: {
            "X-Requested-With": "XMLHttpRequest",
            "Accept": "application/json",
          },
          cache: "no-store",
          credentials: "same-origin",
        });
        if (!response.ok) {
          window.location.href = link.href;
          return;
        }

        const payload = await response.json();
        renderPayload(payload, { force: true, updateHistory: true });
      } catch (_) {
        window.location.href = link.href;
      } finally {
        requestInFlight = false;
        setDetailBusyState(false);
      }
    });

    window.setInterval(refreshLiveState, 1000);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        refreshLiveState();
      }
    });
  })();
</script>
